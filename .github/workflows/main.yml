name: Blogger Perpetual SEO Poster
stop
on:
  workflow_dispatch:

concurrency:
  group: blogger-group
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🚀 Run Blogger Automation
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          BLOGGER_ID: ${{ secrets.BLOGGER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          PYTHONUNBUFFERED: 1
        run: |
          pip install requests bs4 g4f google-api-python-client google-auth-httplib2 google-auth-oauthlib urllib3 tweepy telegraph Pillow -q
          
          cat << 'EOF' > blogger_script.py
          import os, asyncio, re, requests, time, json, random, urllib3, sys
          from datetime import datetime, timedelta
          from bs4 import BeautifulSoup
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          import g4f
          import tweepy
          from telegraph import Telegraph

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          HISTORY_FILE = "shows_history.txt"

          BAD_KEYWORDS = ["logo", "icon", "avatar", "brand", "header", "footer", "button", "banner", "sign"]

          SITES_CONFIG = [
              {"name": "ReelShort", "url": "https://www.reelshort.com/ar", "base": "https://www.reelshort.com"},
              {"name": "DramaBox", "url": "https://www.dramabox.com/ar", "base": "https://www.dramabox.com"},
              
              {"name": "FlexTV", "url": "https://flextv.cc/ar", "base": "https://flextv.cc"},
              {"name": "ShortTV", "url": "https://www.shorttv.live/ar", "base": "https://www.shorttv.live"}
          ]

          def get_history():
              history = {}
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line:
                              parts = line.strip().split("|")
                              if len(parts) == 2:
                                  history[parts[0]] = parts[1]
              return history

          def is_valid_image(url, alt_text):
              url_lower = url.lower()
              alt_lower = alt_text.lower()
              if any(word in url_lower or word in alt_lower for word in BAD_KEYWORDS):
                  return False
              if "icon" in url_lower or "logo" in url_lower:
                  return False
              return True

          def get_new_show():
              history = get_history()
              random.shuffle(SITES_CONFIG)
              
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept-Language": "ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8"
              }

              for site in SITES_CONFIG:
                  print(f"🔎 جاري محاولة الفحص العشوائي في موقع: {site['name']}...", flush=True)
                  try:
                      response = requests.get(site['url'], headers=headers, timeout=25, verify=False)
                      if response.status_code != 200:
                          continue

                      soup = BeautifulSoup(response.text, 'html.parser')
                      found_shows = []

                      scripts = soup.find_all('script')
                      for script in scripts:
                          if not script.string: continue
                          json_matches = re.findall(r'\{"id":.*?"title":"([^"]+)".*?"(?:cover|poster|image)":"([^"]+)"', script.string)
                          
                          for m_title, m_img in json_matches:
                              clean_title = m_title.encode().decode('unicode-escape').strip() if '\\u' in m_title else m_title.strip()
                              clean_title = re.sub(r'[a-zA-Z0-9]', '', clean_title).strip()
                              
                              if len(clean_title) > 3 and clean_title not in history:
                                  if is_valid_image(m_img, clean_title) and m_img.startswith('http'):
                                      found_shows.append({
                                          "title": clean_title,
                                          "image": m_img,
                                          "site": site['name'],
                                          "desc": f"مسلسل من منصة {site['name']}"
                                      })

                      if not found_shows:
                          for img in soup.find_all('img', alt=True):
                              raw_alt = img.get('alt', '').strip()
                              title = re.sub(r'[a-zA-Z0-9]', '', raw_alt).strip()
                              
                              if len(title) > 3 and title not in history:
                                  img_url = img.get('data-src') or img.get('data-original') or img.get('src') or img.get('srcset')
                                  if img_url:
                                      img_url = img_url.split(' ')[0] 
                                      if img_url.startswith('//'): img_url = "https:" + img_url
                                      if not img_url.startswith('http'): img_url = site['base'] + img_url
                                      
                                      if is_valid_image(img_url, raw_alt) and "base64" not in img_url:
                                          found_shows.append({
                                              "title": title,
                                              "image": img_url,
                                              "site": site['name'],
                                              "desc": f"مسلسل من منصة {site['name']}"
                                          })

                      if found_shows:
                          selected = random.choice(found_shows)
                          print(f"🎯 تم اختيار مسلسل: '{selected['title']}' من موقع {selected['site']}", flush=True)
                          return selected

                  except Exception as e:
                      print(f"⚠️ فشل الاتصال بموقع {site['name']}: {e}", flush=True)
                      continue

              print("🤷‍♂️ لم يتم العثور على أي محتوى جديد في جميع المواقع حالياً.", flush=True)
              return None

          def generate_seo_content(title, original_desc):
              print(f"🤖 جاري كتابة المقال بالذكاء الاصطناعي لمسلسل '{title}'...", flush=True)
              prompt = (f"اكتب مقالاً احترافياً ومتوافقاً جداً مع السيو (SEO) لمدونة بلوجر عن مسلسل بعنوان '{title}'. "
                        f"الوصف الأساسي: {original_desc}. "
                        f"يجب أن يلتزم المقال بالمعايير التالية: "
                        f"1. استخدم لغة عربية فصحى جذابة ومفهومة. "
                        f"2. المقال يجب أن يحتوي على مقدمة مشوقة، قصة المسلسل بالتفصيل، قائمة بأهم الشخصيات وأدوارهم، مراجعة، وخاتمة. "
                        f"3. استخدم وسوم HTML مثل <h2> و <h3> و <p> و <strong> لتنسيق الفقرات. "
                        f"4. هام جداً: اجعل طول المقال مفصلاً ومتوسطه حوالي 1500 كلمة لضمان تصدر نتائج البحث. "
                        f"5. لا تذكر روابط خارجية. او `, ` ولاترسل شروحات ارسل فقط المطلوب فقط نص المقال بتنسيق HTML.")
              
              try:
                  response = g4f.ChatCompletion.create(
                      model=g4f.models.gpt_4,
                      messages=[{"role": "user", "content": prompt}]
                  )
                  # تنظيف مبدئي
                  clean_response = re.sub(r'<!DOCTYPE.*?>|<html>|</html>|<head>.*?</head>|<body>|</body>', '', response, flags=re.DOTALL | re.IGNORECASE)
                  clean_response = clean_response.replace("```html", "").replace("```", "").strip()
                  print("✅ تمت كتابة المقال بنجاح!", flush=True)
                  return clean_response
              except Exception as e:
                  print(f"⚠️ فشل الذكاء الاصطناعي: {e}", flush=True)
                  return f"<h2>قصة مسلسل {title}</h2><p>{original_desc}</p>"

          def post_to_blogger(title, content, image_url):
              print("📤 جاري النشر على مدونة بلوجر...", flush=True)
              try:
                  creds_data = json.loads(os.environ['GOOGLE_CREDENTIALS'])
                  
                  creds = Credentials(
                      token=None,
                      refresh_token=creds_data['refresh_token'],
                      token_uri='https://oauth2.googleapis.com/token',
                      client_id=creds_data['client_id'],
                      client_secret=creds_data['client_secret']
                  )
                  
                  service = build('blogger', 'v3', credentials=creds)
                  blogger_id = os.environ['BLOGGER_ID']

                  # استخراج وصف البحث (Search Description) من المحتوى لتحسين الأرشفة
                  clean_text_for_desc = BeautifulSoup(content, "html.parser").get_text(separator=" ", strip=True)
                  search_desc = clean_text_for_desc[:145] + "..." if len(clean_text_for_desc) > 145 else clean_text_for_desc

                  # بناء المحتوى النهائي وإضافة الروابط الداخلية
                  full_content = f'<div style="text-align: center;"><img src="{image_url}" style="max-width: 100%; height: auto; border-radius: 10px;" /></div><br>' + content
                  full_content += '<br><hr><br><h3 style="text-align: center;"><a href="https://proreed.blogspot.com">شاهد أيضاً ملخصات مسلسلات أخرى على موقعنا</a></h3>'

                  body = {
                      "kind": "blogger#post",
                      "title": f"ملخص وقصة مسلسل {title} - مراجعة شاملة",
                      "content": full_content,
                      "customMetaData": search_desc,
                      "labels": ["ملخصات", "قصص مسلسلات", title]
                  }

                  posts = service.posts()
                  request = posts.insert(blogId=blogger_id, body=body)
                  result = request.execute()
                  print(f"✅ تم نشر التدوينة بنجاح: {result['url']}", flush=True)
                  return result['url']
              except Exception as e:
                  print(f"❌ خطأ أثناء النشر: {e}", flush=True)
                  return None

          def post_to_twitter(title, blogger_url):
              api_key = os.environ.get('TWITTER_API_KEY')
              api_secret = os.environ.get('TWITTER_API_SECRET')
              access_token = os.environ.get('TWITTER_ACCESS_TOKEN')
              access_secret = os.environ.get('TWITTER_ACCESS_SECRET')

              if not all([api_key, api_secret, access_token, access_secret]):
                  print("⚠️ تخطي النشر على تويتر: بيانات الاعتماد مفقودة في الأسرار.", flush=True)
                  return

              print("📤 جاري النشر على تويتر...", flush=True)
              try:
                  client = tweepy.Client(
                      consumer_key=api_key, consumer_secret=api_secret,
                      access_token=access_token, access_token_secret=access_secret
                  )
                  
                  hashtag = re.sub(r'\W+', '_', title)
                  tweet_text = f"🎬 مسلسل {title} مدبلج كامل بالعربي\n\nشاهد المسلسل كامل من هنا 👇\n{blogger_url}\n\n#مسلسلات #{hashtag}"
                  
                  if len(tweet_text) > 280:
                      tweet_text = tweet_text[:277] + "..."

                  response = client.create_tweet(text=tweet_text)
                  print(f"✅ تم النشر على تويتر بنجاح!", flush=True)
              except Exception as e:
                  print(f"❌ خطأ في اتصال تويتر: {e}", flush=True)

          def post_to_telegraph(title, seo_article, image_url, blogger_url):
              print("📤 جاري النشر على Telegraph...", flush=True)
              try:
                  tgph = Telegraph()
                  tgph.create_account(short_name='AutoPoster', author_name='Admin')
                  
                  formatted_title = f"مسلسل {title} مدبلج كامل بالعربي"
                  
                  # تنظيف الـ HTML ليتوافق مع شروط تيليجراف الصارمة
                  soup_tg = BeautifulSoup(seo_article, 'html.parser')
                  
                  # تحويل العناوين غير المدعومة إلى عناوين مدعومة
                  for tag in soup_tg.find_all(['h1', 'h2']): tag.name = 'h3'
                  for tag in soup_tg.find_all(['h5', 'h6']): tag.name = 'h4'
                  
                  # إزالة الوسوم غير المدعومة مع الاحتفاظ بالنص الذي بداخلها
                  allowed_tags = ['a', 'aside', 'b', 'blockquote', 'br', 'code', 'em', 'figcaption', 'figure', 'h3', 'h4', 'hr', 'i', 'iframe', 'img', 'li', 'ol', 'p', 'pre', 's', 'strong', 'u', 'ul', 'video']
                  for tag in soup_tg.find_all(True):
                      if tag.name not in allowed_tags:
                          tag.unwrap() 
                  
                  clean_telegraph_html = str(soup_tg)
                  
                  # دمج رابط بلوجر في البداية مع صورة ومقال الـ SEO المفلتر
                  full_html = f"<h3>🔗 لمشاهدة المسلسل كامل ومترجم على موقعنا من هنا:</h3><p>👇👇👇👇👇👇👇👇👇</p><h3><a href='{blogger_url}'>{blogger_url}</a></h3><br><img src='{image_url}'/><br><br>{clean_telegraph_html}"
                  
                  response = tgph.create_page(
                      formatted_title,
                      html_content=full_html
                  )
                  url = f"https://telegra.ph/{response['path']}"
                  print(f"✅ تم النشر على تيليجراف: {url}", flush=True)
                  return url
              except Exception as e:
                  print(f"❌ خطأ في اتصال تيليجراف: {e}", flush=True)
                  return None

          def post_to_telegram(title, desc, image_url, telegraph_url):
              bot_token = os.environ.get('TELEGRAM_BOT_TOKEN')
              chat_id = os.environ.get('TELEGRAM_CHAT_ID')
              if not bot_token or not chat_id:
                  print("⚠️ تخطي النشر على تليجرام: لم يتم العثور على TELEGRAM_BOT_TOKEN أو TELEGRAM_CHAT_ID في Secrets", flush=True)
                  return

              print("📤 جاري النشر على Telegram...", flush=True)
              formatted_title = f"مسلسل {title} مدبلج كامل بالعربي"
              caption = f"🎬 {formatted_title}\n\nشاهد المسلسل كامل من هنا 👇👇👇👇👇\n\n https://tubes.odoo.com/?off1=Telegram_RED\n\n📝 {desc}"
              if telegraph_url:
                  caption += f"\n\n"

              url = f"https://api.telegram.org/bot{bot_token}/sendPhoto"
              
              try:
                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}
                  img_response = requests.get(image_url, headers=headers, timeout=15)
                  
                  if img_response.status_code == 200:
                      files = {'photo': ('poster.jpg', img_response.content)}
                      payload = {"chat_id": chat_id, "caption": caption}
                      r = requests.post(url, data=payload, files=files)
                  else:
                      msg_url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
                      payload = {"chat_id": chat_id, "text": f"{caption}\n\n🖼️ {image_url}", "disable_web_page_preview": False}
                      r = requests.post(msg_url, data=payload)

                  if r.status_code == 200:
                      print("✅ تم النشر على تليجرام بنجاح!", flush=True)
                  else:
                      print(f"❌ خطأ تليجرام: {r.text}", flush=True)
              except Exception as e:
                  print(f"❌ خطأ في اتصال تليجرام: {e}", flush=True)

          def post_to_facebook(title, seo_article, image_url):
              fb_page_id = os.environ.get('FB_PAGE_ID')
              access_token = os.environ.get('FB_ACCESS_TOKEN')
              
              if not fb_page_id or not access_token:
                  print("⚠️ تخطي النشر على فيسبوك: بيانات الـ API مفقودة في الأسرار.", flush=True)
                  return

              print("📤 جاري النشر على فيسبوك عبر API...", flush=True)
              try:
                  # تنظيف مقال الـ SEO من وسوم HTML لتحويله لنص عادي ومقروء
                  clean_text = BeautifulSoup(seo_article, "html.parser").get_text(separator="\n", strip=True)
                  
                  # تجهيز الكابشن بالتنسيق المطلوب
                  caption = f"شاهد المسلسل كاملاً من هنا : https://t.me/s/megodrFB\n\n 🎬 مسلسل {title} مدبلج بالعربي كامل ملخص جميع الاجزاء مترجمة \n\n 📝 الملخص:\n{clean_text}"

                  # النشر على صفحة فيسبوك باستخدام Graph API بنقطة الاتصال الخاصة بالصور
                  graph_url = f"https://graph.facebook.com/v19.0/{fb_page_id}/photos"
                  payload = {
                      'url': image_url,
                      'message': caption,
                      'access_token': access_token
                  }
                  
                  r = requests.post(graph_url, data=payload)
                  res = r.json()
                  
                  if 'id' in res:
                      print(f"✅ تم النشر على فيسبوك بنجاح! ID المنشور: {res['id']}", flush=True)
                  else:
                      print(f"❌ فشل النشر على فيسبوك: {res}", flush=True)
                      
              except Exception as e:
                  print(f"❌ خطأ في اتصال فيسبوك (API): {e}", flush=True)

          print("\n" + "="*50)
          print("🚀 بدء نظام النشر التلقائي (Blogger SEO Dual)...")
          print("="*50 + "\n", flush=True)
          start_time = time.time()
          
          while True:
              if time.time() - start_time > 16200: 
                  print("⏳ اكتمل وقت الجلسة الحالية، سيتم إعادة التشغيل لضمان الاستمرارية.", flush=True)
                  break

              show = get_new_show()
              if show:
                  seo_article = generate_seo_content(show['title'], show['desc'])
                  
                  blogger_url = post_to_blogger(show['title'], seo_article, show['image'])
                  if blogger_url:
                      # النشر على تويتر
                      post_to_twitter(show['title'], blogger_url)

                      # النشر على تليجراف
                      t_url = post_to_telegraph(show['title'], seo_article, show['image'], blogger_url)
                      
                      # النشر على تليجرام
                      post_to_telegram(show['title'], show['desc'], show['image'], t_url)
                      
                      # النشر على فيسبوك (عبر الـ Graph API)
                      post_to_facebook(show['title'], seo_article, show['image'])
                      
                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{show['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")
                      
                      print("⏳ انتظار 60 ثانية قبل البحث عن التدوينة التالية...\n", flush=True)
                      time.sleep(1500)
                  else:
                      print("⏳ محاولة أخرى بعد 30 ثانية بسبب فشل النشر...\n", flush=True)
                      time.sleep(30)
              else:
                  print("😴 انتظار 5 دقائق للبحث مرة أخرى...\n", flush=True)
                  time.sleep(300)
          EOF
          python blogger_script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "📝 Update Blogger History" || true
          git push || true

      - name: ⏳ Auto-Restart Workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 جاري إعادة تشغيل الأكشن للاستمرار..."
          gh workflow run "Blogger Perpetual SEO Poster" --ref ${{ github.ref_name }}
